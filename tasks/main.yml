---
- name: Set system hostname (static + transient)
  ansible.builtin.command:
    cmd: "hostnamectl set-hostname --static {{ tailscale_hostname | default(inventory_hostname) }}"
  when: tailscale_set_hostname | default(true)
  changed_when: true

- name: Set transient hostname
  ansible.builtin.command:
    cmd: "hostnamectl set-hostname {{ tailscale_hostname | default(inventory_hostname) }}"
  when: tailscale_set_hostname | default(true)
  changed_when: true

- name: Ensure hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1   {{ tailscale_hostname | default(inventory_hostname) }}"
  when: tailscale_set_hostname | default(true)

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_os_family | lower }}.yml"
    - "default.yml"

- name: Add Tailscale repository key
  ansible.builtin.apt_key:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release | lower }}.noarmor.gpg"
    keyring: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: present

- name: Add Tailscale repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
    state: present
    update_cache: true

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present

- name: Ensure tailscaled is running
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Check current Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json
  changed_when: false
  failed_when: false
  register: tailscale_status

- name: Determine if Tailscale needs authentication
  ansible.builtin.set_fact:
    tailscale_needs_auth: >-
      {{ (tailscale_status.stdout | from_json).BackendState != 'Running' }}
  when: tailscale_status.rc == 0 and tailscale_status.stdout | length > 0

- name: Authenticate with Tailscale
  ansible.builtin.command:
    cmd: >-
      tailscale up
      --auth-key={{ tailscale_auth_key }}
      {{ tailscale_extra_args }}
  when:
    - tailscale_auth_key | length > 0
    - tailscale_needs_auth | default(true)
  register: tailscale_up
  changed_when: tailscale_up.rc == 0

- name: Sync tailscale hostname with system hostname
  ansible.builtin.command:
    cmd: "tailscale set --hostname={{ tailscale_hostname | default(inventory_hostname) }}"
  when: tailscale_set_hostname | default(true)
